<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking Simulator - Accounts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h1>🏦 Banking Simulator</h1>
    <div>
        <a href="index.html">Dashboard</a>
        <a href="accounts.html">Accounts</a>
        <a href="transactions.html">Transactions</a>
        <a href="history.html">History</a>
        <a href="reports.html">Reports</a>
    </div>
</nav>

<div class="container">

    <!-- Create Account -->
    <div class="card">
        <h2>➕ Create New Account</h2>
        <div id="createAlert" class="alert"></div>
        <div class="form-group">
            <label>Account Number</label>
            <input type="text" id="accountNumber" placeholder="e.g. ACC001">
        </div>
        <div class="form-group">
            <label>Holder Name</label>
            <input type="text" id="holderName" placeholder="e.g. Aswitha">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="e.g. aswitha@gmail.com">
        </div>
        <div class="form-group">
            <label>Initial Balance</label>
            <input type="number" id="balance" placeholder="e.g. 10000">
        </div>
        <div class="form-group">
            <label>Account Type</label>
            <select id="accountType">
                <option value="SAVINGS">SAVINGS</option>
                <option value="CURRENT">CURRENT</option>
                <option value="CHECKING">CHECKING</option>
            </select>
        </div>
        <button class="btn btn-primary" onclick="createAccount()">Create Account</button>
    </div>

    <!-- All Accounts -->
    <div class="card">
        <h2>📋 All Accounts</h2>

        <!-- Search Bar -->
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="text" id="searchName" placeholder="🔍 Search by name..."
                   style="padding:10px; border:1px solid #ddd; border-radius:8px; width:300px; font-size:14px">
            <button class="btn btn-primary" onclick="searchAccounts()">Search</button>
            <button class="btn btn-warning" onclick="loadAccounts()">Show All</button>
        </div>

        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Account Number</th>
                <th>Holder Name</th>
                <th>Email</th>
                <th>Account Type</th>
                <th>Balance</th>
                <th>Created At</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="accountsTable">
            <tr><td colspan="9">Loading...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const API = 'http://localhost:8080/api';

    // Load Accounts
    async function loadAccounts() {
        const res = await fetch(`${API}/accounts`);
        const accounts = await res.json();
        displayAccounts(accounts);
    }

    // Search Accounts by Name
    async function searchAccounts() {
        const name = document.getElementById('searchName').value;
        if (!name) {
            loadAccounts();
            return;
        }
        const res = await fetch(`${API}/accounts/search?name=${name}`);
        const accounts = await res.json();
        displayAccounts(accounts);
    }

    // Display Accounts
    function displayAccounts(accounts) {
        const tbody = document.getElementById('accountsTable');
        tbody.innerHTML = '';

        if (accounts.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9">No accounts found</td></tr>';
            return;
        }

        accounts.forEach(a => {
            tbody.innerHTML += `
                <tr>
                    <td>${a.id}</td>
                    <td>${a.accountNumber}</td>
                    <td>${a.holderName}</td>
                    <td>${a.email || 'N/A'}</td>
                    <td><span class="badge badge-deposit">${a.accountType || 'SAVINGS'}</span></td>
                    <td>₹${a.balance.toLocaleString()}</td>
                    <td>${a.createdAt ? new Date(a.createdAt).toLocaleDateString() : 'N/A'}</td>
                    <td>
                        <span class="badge ${a.active ? 'badge-success' : 'badge-danger'}">
                            ${a.active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>
                        <button class="btn btn-warning" onclick="toggleAccount(${a.id}, ${a.active})">
                            ${a.active ? 'Deactivate' : 'Activate'}
                        </button>
                        <button class="btn btn-danger" onclick="deleteAccount(${a.id})">Delete</button>
                    </td>
                </tr>`;
        });
    }

    // Create Account
    async function createAccount() {
        const accountNumber = document.getElementById('accountNumber').value;
        const holderName = document.getElementById('holderName').value;
        const email = document.getElementById('email').value;
        const balance = document.getElementById('balance').value;
        const accountType = document.getElementById('accountType').value;

        if (!accountNumber || !holderName || !balance) {
            const alert = document.getElementById('createAlert');
            alert.className = 'alert alert-error';
            alert.style.display = 'block';
            alert.textContent = 'Please fill all required fields!';
            return;
        }

        const account = {
            accountNumber: accountNumber,
            holderName: holderName,
            email: email,
            balance: parseFloat(balance),
            accountType: accountType,
            active: true
        };

        const res = await fetch(`${API}/accounts`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(account)
        });

        const alert = document.getElementById('createAlert');
        if (res.ok) {
            alert.className = 'alert alert-success';
            alert.style.display = 'block';
            alert.textContent = 'Account created successfully!';
            loadAccounts();
        } else {
            const error = await res.text();
            alert.className = 'alert alert-error';
            alert.style.display = 'block';
            alert.textContent = 'Error: ' + error;
        }
    }

    // Toggle Account Active/Inactive
    async function toggleAccount(id, isActive) {
        const endpoint = isActive ? 'deactivate' : 'reactivate';
        await fetch(`${API}/accounts/${id}/${endpoint}`, { method: 'PUT' });
        loadAccounts();
    }

    // Delete Account
    async function deleteAccount(id) {
        if (confirm('Are you sure you want to delete this account?')) {
            await fetch(`${API}/accounts/${id}`, { method: 'DELETE' });
            loadAccounts();
        }
    }

    loadAccounts();
</script>

</body>
</html>
